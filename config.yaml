# 论坛数据源配置（需要特殊处理）
forum_sources: []

# 社交媒体数据源配置（需要API支持）
social_sources: []

# 配置选项
settings:
  max_items_per_source: 20  # 每个源最多抓取多少条
  update_interval: "daily"   # 更新频率
  output_dir: "docs"         # 输出目录（GitHub Pages）

# 增强HTTP客户端配置
http_client:
  enabled: true              # 是否启用增强HTTP客户端
  use_proxy: false           # 是否使用代理
  proxy_list: []             # 代理服务器列表
  max_retries: 3             # 最大重试次数
  timeout: 30                # 请求超时时间（秒）
  
  # 延迟配置
  delay_strategy: "adaptive"   # 延迟策略: fixed, random, linear, exponential, adaptive
  delay_range: [2, 5]        # 请求延迟范围（秒）
  
  # 自适应延迟配置 (仅在 delay_strategy: adaptive 时生效)
  adaptive_delay:
    base_delay: 2.0          # 基础延迟时间
    max_delay: 15.0          # 最大延迟时间
    increase_factor: 1.5     # 错误时延迟增长因子
    decrease_factor: 0.8     # 成功时延迟减少因子
    error_threshold: 3       # 错误阈值

# 日志配置
logging:
  level: "INFO"              # 日志级别: DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
